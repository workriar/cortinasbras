[phases.install]
cmds = ["npm ci"]
# Instalar Chromium e dependências para Puppeteer
pkgs = ["chromium", "fonts-liberation", "libnss3", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxrandr2", "mesa-utils", "pango"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
